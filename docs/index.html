<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>onkedgeo0369</title>
  <style>
    :root {
      --bg: #0e1621;
      --panel: #172231;
      --panel-alt: #1f2d40;
      --line: #2e4159;
      --text: #eef4fb;
      --muted: #a8b6c7;
      --accent: #4ecdc4;
      --accent-2: #ffd166;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0a121c 0%, #0f1824 100%);
      color: var(--text);
    }
    a { color: var(--accent); }
    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 14px 16px 12px;
      background: rgba(10, 18, 28, 0.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }
    .topline {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .meta {
      font-size: 12px;
      color: var(--muted);
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }
    .tab {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #072129;
      font-weight: 700;
    }
    .summary {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .summary strong {
      color: var(--accent-2);
      font-weight: 700;
    }
    .menu {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .viewer {
      min-height: 0;
      padding: 0;
    }
    iframe {
      width: 100%;
      height: calc(100vh - 128px);
      border: 0;
      background: white;
    }
    @media (max-width: 720px) {
      iframe {
        height: calc(100vh - 168px);
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header">
      <div class="topline">
        <h1>onkedgeo0369</h1>
        <div class="meta">Published from <code>docs/</code> • refreshed Mar 29, 2026 10:40 PM CT</div>
      </div>
      <div class="controls">
        <button class="tab" type="button" data-page="nba-gl">NBA GL</button>
        <button class="tab" type="button" data-page="mlb-gl">MLB GL</button>
        <button class="tab" type="button" data-page="nba-props">NBA Props</button>
        <button class="tab" type="button" data-page="mlb-props">MLB Props</button>
      </div>
      <div class="summary">
        <strong id="page-label">NBA GL</strong>
        <span id="page-summary">NBA game lines</span>
        <span class="menu">
          <a href="nba_gl.html" target="_blank" rel="noopener">NBA GL</a>
          <a href="mlb_gl.html" target="_blank" rel="noopener">MLB GL</a>
          <a href="props.html" target="_blank" rel="noopener">NBA Props</a>
          <a href="mlb_props.html" target="_blank" rel="noopener">MLB Props</a>
        </span>
      </div>
    </div>
    <div class="viewer">
      <iframe id="frame" title="Dashboard viewer" loading="eager"></iframe>
    </div>
  </div>
  <script>
    const pages = {
      "nba-gl": {"label": "NBA GL", "file": "nba_gl.html", "summary": "NBA game lines"},
      "mlb-gl": {"label": "MLB GL", "file": "mlb_gl.html", "summary": "MLB game lines"},
      "nba-props": {"label": "NBA Props", "file": "props.html", "summary": "NBA props"},
      "mlb-props": {"label": "MLB Props", "file": "mlb_props.html", "summary": "MLB props"}
    };
    const tabs = Array.from(document.querySelectorAll(".tab"));
    const frame = document.getElementById("frame");
    const label = document.getElementById("page-label");
    const summary = document.getElementById("page-summary");

    function currentSlug() {
      const fromHash = window.location.hash.replace(/^#/, "");
      if (pages[fromHash]) return fromHash;
      return "nba-gl";
    }

    function setPage(slug, updateHash = true) {
      const page = pages[slug] || pages["nba-gl"];
      frame.src = page.file;
      label.textContent = page.label;
      summary.textContent = page.summary;
      tabs.forEach((tab) => {
        tab.classList.toggle("active", tab.dataset.page === slug);
      });
      if (updateHash) {
        window.location.hash = slug;
      }
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => setPage(tab.dataset.page));
    });

    window.addEventListener("hashchange", () => setPage(currentSlug(), false));
    setPage(currentSlug(), false);
  </script>
</body>
</html>
